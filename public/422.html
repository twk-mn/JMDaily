<!DOCTYPE html>
<html lang="en">
<head>
  <title>Request not accepted — Joetsu-Myoko Daily</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid #e5e7eb;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header a { text-decoration: none; color: inherit; }
    header h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header p { font-size: 0.8rem; color: #6b7280; margin-top: 0.25rem; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #e5e7eb;
      line-height: 1;
      font-family: Georgia, serif;
    }
    h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 1rem 0 0.75rem;
    }
    p { font-size: 0.95rem; color: #6b7280; max-width: 36rem; margin: 0 auto 2rem; line-height: 1.6; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    footer { border-top: 1px solid #e5e7eb; padding: 1.5rem 1rem; text-align: center; }
    footer p { font-size: 0.8rem; color: #9ca3af; margin: 0; }
  </style>
</head>
<body>
  <header>
    <a href="/">
      <h1>Joetsu-Myoko Daily</h1>
      <p>Local news in English — Joetsu · Myoko · Niigata</p>
    </a>
  </header>

  <main>
    <div>
      <div class="error-code">422</div>
      <h2>Request not accepted</h2>
      <p>The request could not be processed — this is usually caused by an expired form or a security token mismatch. Please go back and try again.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Go to homepage</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; Joetsu-Myoko Daily</p>
  </footer>
</body>
</html>
