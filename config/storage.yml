test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Cloudflare R2 — S3-compatible object storage (used in production on Railway)
#
# Required environment variables (set in Railway dashboard):
#   R2_ACCOUNT_ID        — Cloudflare account ID (found in R2 dashboard)
#   R2_ACCESS_KEY_ID     — R2 API token access key
#   R2_SECRET_ACCESS_KEY — R2 API token secret key
#   R2_BUCKET            — bucket name (e.g. jmdaily-production)
#
# Optional but recommended:
#   R2_PUBLIC_URL        — custom public domain for assets
#                          (e.g. https://assets.jmdaily.com). When set, the
#                          active_storage_cdn initializer rewrites public URLs
#                          to use this host so blobs are served via the CDN
#                          instead of the R2 origin endpoint. Configure this
#                          after enabling public access + a custom domain on
#                          the R2 bucket.
cloudflare_r2:
  service: S3
  access_key_id: <%= ENV["R2_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["R2_SECRET_ACCESS_KEY"] %>
  region: auto
  bucket: <%= ENV["R2_BUCKET"] %>
  endpoint: https://<%= ENV["R2_ACCOUNT_ID"] %>.r2.cloudflarestorage.com
  force_path_style: true
  public: true
