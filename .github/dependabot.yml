version: 2
updates:
  # Ruby gems
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      rails:
        patterns:
          - "rails*"
          - "actionpack"
          - "activerecord"
          - "activesupport"
      test:
        patterns:
          - "rspec*"
          - "factory_bot*"
          - "shoulda*"
          - "faker"
          - "simplecov"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
